# Build workflow: produces artifacts for Craft releases
# Triggered on push to main/release branches and PRs

name: Build & Test
on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm biome check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build server (generates type declarations)
        run: pnpm --filter @freestyle/server build

      - name: Typecheck electron (web)
        working-directory: apps/electron
        run: pnpm run typecheck:web

  test-server:
    name: Test (Server API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Run server tests
        run: pnpm --filter @freestyle/server run test

  test-electron:
    name: Test (Electron E2E)
    needs: [test-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libgtk-3-0 libgbm1 libasound2t64 libx11-xcb1

      - name: Build server
        run: pnpm --filter @freestyle/server build

      - name: Build electron app
        working-directory: apps/electron
        run: pnpm run build

      - name: Run Electron E2E tests
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" pnpm --filter @freestyle/electron run test:e2e

  build-linux:
    name: Build (Linux)
    needs: [lint, typecheck, test-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build server
        run: pnpm --filter @freestyle/server build

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxtst-dev libxext-dev libglib2.0-dev cmake

      - name: Build whisper.cpp binaries
        working-directory: apps/electron
        run: node scripts/download-whisper-cpp.mjs --resources

      - name: Build electron (Linux)
        working-directory: apps/electron
        run: pnpm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            apps/electron/dist/*.AppImage
            apps/electron/dist/*.deb
            apps/electron/dist/latest*.yml
          if-no-files-found: warn

  build-mac:
    name: Build (macOS)
    needs: [lint, typecheck, test-server]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile

      - name: Build server
        run: pnpm --filter @freestyle/server build

      - name: Build MLX ASR worker archive
        run: ./scripts/build_mlx_asr_worker.sh

      - name: Verify MLX ASR worker archive exists
        run: test -f dist/mlx_asr_worker-darwin-arm64.tar.gz

      - name: Build whisper.cpp binaries
        working-directory: apps/electron
        run: node scripts/download-whisper-cpp.mjs --resources

      - name: Build electron (macOS)
        working-directory: apps/electron
        run: pnpm run build:mac
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            dist/mlx_asr_worker-darwin-arm64.tar.gz
            apps/electron/dist/*.dmg
            apps/electron/dist/*.zip
            apps/electron/dist/latest*.yml
            apps/electron/dist/*.blockmap
          if-no-files-found: warn

  build-windows:
    name: Build (Windows)
    needs: [lint, typecheck, test-server]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build server
        run: pnpm --filter @freestyle/server build

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Download whisper.cpp binaries
        working-directory: apps/electron
        run: node scripts/download-whisper-cpp.mjs --resources

      - name: Build electron (Windows)
        working-directory: apps/electron
        run: pnpm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            apps/electron/dist/*.exe
            apps/electron/dist/*.msi
            apps/electron/dist/latest*.yml
            apps/electron/dist/*.blockmap
          if-no-files-found: warn

  ci-status:
    name: CI Status
    if: always()
    needs:
      - lint
      - typecheck
      - test-server
      - test-electron
      - build-linux
      - build-mac
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Check CI result
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "CI failed, was cancelled, or a required job was skipped"
          exit 1
